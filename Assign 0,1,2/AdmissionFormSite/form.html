<!DOCTYPE html>
<html>
<head>
  <title>Admission Form</title>
<link rel="stylesheet" href="style.css">
<img src="Cummins.jpeg" class="college_img" alt="College Image">
<script src="jquery-4.0.0.js"></script>
<script src="Jquery-commands.js"></script>
</head>

<body>
<br><br><br><br>
<h1 >Third Year Admission Form</h1>
<marquee behavior="span" direction="left">Admission ends at 31st January</marquee>

<form action="#" method="post">
<h3 id="Personal">Personal Details</h3>
	<div id="panel1">
  <label for="fname">Name of the Candidate:</label><br>
  <input type="text" id="fname" name="fname" maxlength="50"
         placeholder="Full Name" required>
  <br><br>

  <label for="mail">Email:</label><br>
  <input type="email" id="mail" name="email"
         placeholder="College Mail" required>
  <br><br>

  <label for="birthday">Date of Birth:</label><br>
  <input type="date" id="birthday" name="dob" min="1930-01-01" required>
  <br><br>

  <label for="state">State of Residence:</label>
<select id="state" name="state">
  <label for="state">State of Residence:</label><br>

  <option value="" selected disabled>-- Select your State --</option>
  <option value="Bihar">Bihar</option>
  <option value="Chhattisgarh">Chhattisgarh</option>
  <option value="Goa">Goa</option>
  <option value="Gujarat">Gujarat</option>
  <option value="Haryana">Haryana</option>
  <option value="Himachal Pradesh">Himachal Pradesh</option>
  <option value="Jharkhand">Jharkhand</option>
  <option value="Karnataka">Karnataka</option>
  <option value="Kerala">Kerala</option>
  <option value="Madhya Pradesh">Madhya Pradesh</option>
  <option value="Maharashtra">Maharashtra</option>
  <option value="Manipur">Manipur</option>
  <option value="Meghalaya">Meghalaya</option>
  <option value="Mizoram">Mizoram</option>
  <option value="Nagaland">Nagaland</option>
  <option value="Odisha">Odisha</option>
  <option value="Punjab">Punjab</option>
  <option value="Rajasthan">Rajasthan</option>
  <option value="Sikkim">Sikkim</option>
</select>

<br><br>

  <label for="temp_address">Temporary Address:</label><br>
  <textarea id="temp_address" name="temp_address"
            rows="4" cols="30" required></textarea>
  <br><br>

  <label for="perm_address">Permanent Address:</label><br>
  <textarea id="perm_address" name="perm_address"
            rows="4" cols="30" required></textarea>
  <br><br>

  <label>Gender:</label><br>
  <input type="radio" id="female" name="gender" value="female">
  <label for="female">Female</label><br>

  <br><br>

  <label for="phone">Contact Number:</label><br>
  <input type="tel" id="phone" name="phone"
         placeholder="10-digit number"
         pattern="[0-9]{10}" required>
  <br><br>
</div>
<h3 id="College_Information">College Details</h3>
  <div id="panel2">
  <label>Department:</label><br>
  <input type="radio" id="CS" name="dept" value="CS" required>
  <label for="CS">Computer Science</label><br>

  <input type="radio" id="IT" name="dept" value="IT">
  <label for="IT">Information Technology</label><br>

  <input type="radio" id="E&TC" name="dept" value="E&TC">
  <label for="E^&TC">Electronics and Telecommunication</label><br>

  <input type="radio" id="Mech" name="dept" value="Mech">
  <label for="Mech">Mechanical</label><br>

  <input type="radio" id="Instrumentation" name="dept" value="Instru">
  <label for="Instru">Instrumentation</label><br>

  <br><br>


  <label>Learning Preference (Theory vs. Practical):</label><br>
<span>Theory</span> 
<input type="range" id="style" name="style" min="0" max="100"> 
<span>Hands-on</span>
 <br><br>

  <label for="resume">Resume Link:</label><br>
  <input type="url" id="resume" name="resume">
  <br><br>

  <label for="interest">
    Why do you want to become a student of our College?
  </label><br>
  <textarea id="interest" name="interest"
            rows="4" cols="30" required></textarea>
  <br><br>
</div>

<h3 id="Documents">Required Documents</h3>
<div id="panel3">
  <label>Introductory Video:</label><br>
  <input type="file" accept="video/*">
  <br><br>

  <label>Upload Signature:</label><br>
  <input type="file" accept="image/*">
  <br><br>

  <table class="doc-table">
    <tr>
      <th>Document Name</th>
      <th>Upload File</th>
    </tr>
    <tr>
      <td><label for="upload-adhar">Adhaar Card</label></td>
      <td><input type="file" id="upload-adhar" name="adhar" accept=".pdf,image/*"></td>
    <td><input type="checkbox" id="AC" name="AC" value="Adhaar Card"></td>
    </tr>
    <tr>
      <td><label for="upload-ration">Ration Card</label></td>
      <td><input type="file" id="upload-ration" name="ration" accept=".pdf,image/*"></td>
      <td><input type="checkbox" id="RC" name="RC" value="Ration Card"></td>
    </tr>
    <tr>
      <td><label for="upload-lc">Leaving Certificate</label></td>
      <td><input type="file" id="upload-lc" name="lc" accept=".pdf,image/*"></td>
      <td><input type="checkbox" id="Resume" name="Resume" value="Resume"></td>
    </tr>
  </table>
</div>
  <br><br>
  <input type="submit" value="Submit">
</form>

<br>
<a href="https://cumminscollege.org/" target="_blank">
  Visit Cummins College of Engineering for Women
</a>

</body>
</html>
